services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    # Uploaded invoice images + AFIP certs persist across redeploys.
    # In the cloud this maps to an EBS-backed host dir; locally a named volume.
    volumes:
      - appdata:/app/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  appdata:
